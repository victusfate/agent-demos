<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>l-system atelier — grammar in, garden out</title>
</head>
<body>

<script id="logic">
'use strict';
// Pure, DOM-free L-system math — extracted and unit-tested in Node via
// experiments/_harness/logic.mjs (see docs/l-system-atelier/plan.md).
// IIFE so only __logic reaches the shared global scope.
(() => {

// expand: n parallel derivations. Every pass rewrites all symbols at once;
// symbols without a rule copy through unchanged.
function expand(axiom, rules, n) {
  let s = axiom;
  for (let i = 0; i < n; i++) {
    let out = '';
    for (const ch of s) out += rules[ch] ?? ch;
    s = out;
  }
  return s;
}

// interpret: turtle walk. F draws, f moves, +/- turn by `angle` degrees,
// [ pushes state, ] pops; everything else is silent. Starts at (0,0)
// heading up (screen coords). Returns segments {x1,y1,x2,y2,depth} and the
// tight bounding box of all endpoints. Pure trig, no canvas.
function interpret(s, { angle, step }) {
  const rad = angle * Math.PI / 180;
  let x = 0, y = 0, h = -Math.PI / 2, depth = 0;
  const stack = [];
  const segments = [];
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  const see = (px, py) => {
    if (px < minX) minX = px; if (px > maxX) maxX = px;
    if (py < minY) minY = py; if (py > maxY) maxY = py;
  };
  for (const ch of s) {
    if (ch === 'F') {
      const nx = x + Math.cos(h) * step, ny = y + Math.sin(h) * step;
      segments.push({ x1: x, y1: y, x2: nx, y2: ny, depth });
      see(x, y); see(nx, ny);
      x = nx; y = ny;
    } else if (ch === 'f') {
      x += Math.cos(h) * step; y += Math.sin(h) * step;
    } else if (ch === '+') {
      h -= rad;
    } else if (ch === '-') {
      h += rad;
    } else if (ch === '[') {
      stack.push({ x, y, h });
      depth++;
    } else if (ch === ']') {
      const t = stack.pop();
      if (t) { x = t.x; y = t.y; h = t.h; depth--; }
    }
    // other symbols: silent growth markers
  }
  return { segments, bounds: { minX, minY, maxX, maxY } };
}

// brackets balanced: counter never dips below zero, ends at zero
function balanced(s) {
  let d = 0;
  for (const ch of s) {
    if (ch === '[') d++;
    else if (ch === ']' && --d < 0) return false;
  }
  return d === 0;
}

// validate: null when the system is safe to derive, otherwise a gentle
// error string. Budgets are checked by counting symbols per derivation
// (no string is ever built), so runaway systems abort cheaply. The budget
// that matters is drawn segments (F count, capped at maxSegments); total
// symbols get a generous safety cap so silent-symbol blowups abort too.
function validate(axiom, rules, n, maxSegments = 60000) {
  const maxSymbols = Math.max(maxSegments * 16, 1e6);
  if (!axiom || !axiom.trim()) return 'the axiom is empty';
  if (!balanced(axiom)) return 'unbalanced brackets in the axiom';
  for (const [k, v] of Object.entries(rules)) {
    if (!balanced(v)) return `unbalanced brackets in the ${k} rule`;
  }
  let counts = {};
  for (const ch of axiom) counts[ch] = (counts[ch] || 0) + 1;
  for (let i = 0; i < n; i++) {
    const next = {};
    let total = 0;
    for (const [sym, c] of Object.entries(counts)) {
      for (const ch of rules[sym] ?? sym) {
        next[ch] = (next[ch] || 0) + c;
      }
    }
    for (const c of Object.values(next)) total += c;
    if ((next.F || 0) > maxSegments) return `derivation explodes past ${maxSegments.toLocaleString()} segments at pass ${i + 1}`;
    if (total > maxSymbols) return `derivation explodes past ${maxSymbols.toLocaleString()} symbols at pass ${i + 1}`;
    counts = next;
  }
  return null;
}

// mutate: one structural perturbation — flip a turn sign, or duplicate a
// bracketed branch clause. Never touches the input; rng in [0,1).
function mutate(rules, rng) {
  const keys = Object.keys(rules);
  const candidates = [];
  for (const k of keys) {
    const v = rules[k];
    for (let i = 0; i < v.length; i++) {
      const ch = v[i];
      if (ch === '+' || ch === '-') {
        candidates.push({ k, apply: s => s.slice(0, i) + (ch === '+' ? '-' : '+') + s.slice(i + 1) });
      } else if (ch === '[') {
        // find the matching ] and duplicate the whole clause
        let d = 0;
        for (let j = i; j < v.length; j++) {
          if (v[j] === '[') d++;
          else if (v[j] === ']' && --d === 0) {
            const clause = v.slice(i, j + 1);
            candidates.push({ k, apply: s => s.slice(0, j + 1) + clause + s.slice(j + 1) });
            break;
          }
        }
      }
    }
  }
  const out = { ...rules };
  if (!candidates.length) {
    // featureless rules: graft a small branch onto the first rule
    const k = keys[0];
    if (k !== undefined) out[k] = rules[k] + '[+F]';
    return out;
  }
  const pick = candidates[Math.floor(rng() * candidates.length) % candidates.length];
  out[pick.k] = pick.apply(rules[pick.k]);
  return out;
}

// Six shipped systems. Iteration counts are tuned so every preset lands
// well under the 60k-segment budget (see tests).
const PRESETS = {
  Fern:      { axiom: 'X',       rules: { X: 'F+[[X]-X]-F[-FX]+X', F: 'FF' }, angle: 25,   iterations: 7 },
  Weed:      { axiom: 'F',       rules: { F: 'F[+F]F[-F]F' },                 angle: 22.5, iterations: 5 },
  Bush:      { axiom: 'F',       rules: { F: 'FF+[+F-F-F]-[-F+F+F]' },        angle: 22.5, iterations: 4 },
  Snowflake: { axiom: 'F--F--F', rules: { F: 'F+F--F+F' },                    angle: 60,   iterations: 5 },
  Dragon:    { axiom: 'FX',      rules: { X: 'X+YF+', Y: '-FX-Y' },           angle: 90,   iterations: 13 },
  Sparse:    { axiom: 'X',       rules: { X: 'F[+X][-X]FX', F: 'FF' },        angle: 25.7, iterations: 7 },
};

globalThis.__logic = { expand, interpret, validate, mutate, PRESETS };
})();
</script>
</body>
</html>
