<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>ink drift — ink in dark water</title>
</head>
<body>
<script id="logic">
'use strict';
// Pure, DOM-free math — extracted and unit-tested in Node via
// experiments/_harness/logic.mjs. IIFE so only __logic reaches the
// shared global scope.
(() => {

// Seeded 2D value noise: hashed lattice values, smoothstep-interpolated.
// Returned function maps any (x, y) to [0, 1], fully determined by the seed.
function makeNoise(seed) {
  // 32-bit integer hash of a lattice point + seed -> [0, 1)
  const hash = (ix, iy) => {
    let h = (ix * 374761393 + iy * 668265263 + (seed | 0) * 2147483647) | 0;
    h = Math.imul(h ^ (h >>> 13), 1274126177);
    h ^= h >>> 16;
    return (h >>> 0) / 4294967296;
  };
  const smooth = t => t * t * (3 - 2 * t);
  return (x, y) => {
    const ix = Math.floor(x), iy = Math.floor(y);
    const fx = x - ix, fy = y - iy;
    const ux = smooth(fx), uy = smooth(fy);
    const a = hash(ix, iy),     b = hash(ix + 1, iy);
    const c = hash(ix, iy + 1), d = hash(ix + 1, iy + 1);
    return a + (b - a) * ux + (c - a) * uy + (a - b - c + d) * ux * uy;
  };
}

// Fractal sum of `noise`, normalized so the result stays in [0, 1].
function fbm(noise, x, y, octaves) {
  let sum = 0, amp = 1, norm = 0, f = 1;
  for (let o = 0; o < octaves; o++) {
    sum += noise(x * f, y * f) * amp;
    norm += amp;
    amp *= 0.5;
    f *= 2;
  }
  return sum / norm;
}

// Curl of a scalar field: the perpendicular gradient (dn/dy, -dn/dx),
// central differences. Divergence-free by construction — fake fluid.
function curl(noiseFn, x, y, eps) {
  const dndy = (noiseFn(x, y + eps) - noiseFn(x, y - eps)) / (2 * eps);
  const dndx = (noiseFn(x + eps, y) - noiseFn(x - eps, y)) / (2 * eps);
  return { vx: dndy, vy: -dndx };
}

// Pure kinematic update (Verlet-style: implicit velocity is x - px).
// Damps the carried motion by `drag` and adds the field velocity over dt.
function stepParticle(p, vel, dt, drag) {
  const ivx = (p.x - p.px) * drag + vel.vx * dt;
  const ivy = (p.y - p.py) * drag + vel.vy * dt;
  return { ...p, px: p.x, py: p.y, x: p.x + ivx, y: p.y + ivy };
}

// Inks lifted from the nightbloom palettes.
const PALETTES = [
  { name: 'ember',   inks: ['#ffb347', '#ff7e5f', '#ffd97a'] },
  { name: 'orchid',  inks: ['#e96bff', '#b04cff', '#ff9de2'] },
  { name: 'lagoon',  inks: ['#39e6c8', '#3fd0ff', '#8af5e2'] },
  { name: 'frost',   inks: ['#9db8ff', '#cfe0ff', '#7e9bff'] },
  { name: 'sunfall', inks: ['#ffd23f', '#ff9a3d', '#ffe98a'] },
  { name: 'spirit',  inks: ['#b8ffd9', '#7df0b8', '#e4ffe9'] },
];

globalThis.__logic = { makeNoise, fbm, curl, stepParticle, PALETTES };
})();
</script>
</body>
</html>
